<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Presensi Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   TOKENS
══════════════════════════════════════ */
:root {
  --bg:       #0a0f1e;
  --surface:  #111827;
  --surface2: #1a2235;
  --border:   rgba(255,255,255,.08);
  --borderA:  rgba(255,255,255,.18);

  --hadir:    #10b981; --hadir-bg: rgba(16,185,129,.13); --hadir-glow: rgba(16,185,129,.35);
  --pulang:   #38bdf8; --pulang-bg:rgba(56,189,248,.13); --pulang-glow:rgba(56,189,248,.35);
  --ijin:     #fbbf24; --ijin-bg:  rgba(251,191,36,.13);  --ijin-glow:  rgba(251,191,36,.35);
  --sakit:    #f87171; --sakit-bg: rgba(248,113,113,.13); --sakit-glow: rgba(248,113,113,.35);
  --wfa:      #a78bfa; --wfa-bg:   rgba(167,139,250,.13); --wfa-glow:   rgba(167,139,250,.35);

  --text:     #f1f5f9;
  --text2:    #94a3b8;
  --text3:    #475569;

  --ff: 'Sora', sans-serif;
  --ffm: 'JetBrains Mono', monospace;
  --r:  14px;
  --r2: 10px;
}

/* ══════════════════════════════════════
   BASE
══════════════════════════════════════ */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { -webkit-tap-highlight-color: transparent; }
body {
  font-family: var(--ff);
  background: var(--bg);
  min-height: 100vh;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  padding: 0;
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 0%,  rgba(99,102,241,.18), transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 100%, rgba(16,185,129,.12), transparent 55%);
}

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius:99px; }

/* ══════════════════════════════════════
   CARD SHELL
══════════════════════════════════════ */
.shell {
  position:relative; z-index:1;
  max-width:500px; margin:0 auto;
  min-height:100vh;
  display:flex; flex-direction:column;
}

/* ══════════════════════════════════════
   HEADER
══════════════════════════════════════ */
.header {
  padding: 36px 24px 32px;
  text-align: center;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid var(--border);
}
.header::after {
  content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:180px; height:1px;
  background: linear-gradient(90deg, transparent, rgba(99,102,241,.7), transparent);
}
.hdr-dot {
  display:inline-flex; align-items:center; justify-content:center;
  width:64px; height:64px; border-radius:50%;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  font-size:28px; margin-bottom:14px;
  box-shadow: 0 0 32px rgba(99,102,241,.4), 0 0 0 8px rgba(99,102,241,.1);
  animation: float 3.5s ease-in-out infinite;
}
@keyframes float {
  0%,100%{ transform:translateY(0); }
  50%    { transform:translateY(-6px); }
}
.header h1 {
  font-size:1.45rem; font-weight:800; letter-spacing:-.5px; margin-bottom:5px;
  background: linear-gradient(135deg,#fff 40%,rgba(255,255,255,.55));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.header p { font-size:.82rem; color:var(--text2); line-height:1.5; }
.live-time {
  display:inline-flex; align-items:center; gap:6px;
  margin-top:12px; padding:5px 14px; border-radius:99px;
  background:rgba(255,255,255,.06); border:1px solid var(--border);
  font-size:.78rem; font-family:var(--ffm); color:var(--text2);
}
.live-dot { width:7px; height:7px; border-radius:50%; background:#10b981; animation:blink 1.4s ease-in-out infinite; flex-shrink:0; }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.3;} }

/* ══════════════════════════════════════
   BODY
══════════════════════════════════════ */
.body { padding:20px 16px 40px; flex:1; }

/* ── FIELD GROUP ── */
.field { margin-bottom:16px; }
.field label {
  display:flex; align-items:center; gap:6px;
  font-size:.78rem; font-weight:700; color:var(--text2);
  text-transform:uppercase; letter-spacing:.6px;
  margin-bottom:8px;
}
.field input, .field select {
  width:100%; padding:13px 16px;
  background:var(--surface2); border:1.5px solid var(--border);
  border-radius:var(--r2); color:var(--text);
  font-family:var(--ff); font-size:.95rem;
  transition:border-color .2s, box-shadow .2s;
  -webkit-appearance:none; appearance:none;
}
.field input:focus, .field select:focus {
  outline:none; border-color:rgba(99,102,241,.6);
  box-shadow:0 0 0 3px rgba(99,102,241,.12);
}
.field input::placeholder { color:var(--text3); }

.row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

/* ══════════════════════════════════════
   STATUS PICKER — THE STAR
══════════════════════════════════════ */
.status-label {
  font-size:.78rem; font-weight:700; color:var(--text2);
  text-transform:uppercase; letter-spacing:.6px;
  display:flex; align-items:center; gap:6px;
  margin-bottom:10px;
}
.status-grid {
  display:grid; grid-template-columns:repeat(5,1fr); gap:8px;
  margin-bottom:16px;
}
.status-btn {
  display:flex; flex-direction:column; align-items:center; gap:5px;
  padding:12px 4px 10px;
  border-radius:var(--r2);
  border:1.5px solid var(--border);
  background:var(--surface2);
  cursor:pointer; transition:all .2s ease; user-select:none;
  position:relative; overflow:hidden;
}
.status-btn::before {
  content:''; position:absolute; inset:0;
  background:var(--c,transparent); opacity:0;
  transition:opacity .2s;
}
.status-btn:hover { border-color:var(--borderA); transform:translateY(-2px); }
.status-btn.active {
  border-color:var(--c) !important;
  background:var(--cbg) !important;
  box-shadow:0 4px 20px var(--cglow), 0 0 0 1px var(--c);
}
.status-btn.active::before { opacity:.08; }
.sb-icon { font-size:1.5rem; position:relative; z-index:1; }
.sb-lbl {
  font-size:.64rem; font-weight:700; letter-spacing:.3px;
  text-transform:uppercase; color:var(--text3);
  position:relative; z-index:1; transition:color .2s;
}
.status-btn.active .sb-lbl { color:var(--c); }
.status-hidden { display:none; }

/* ══════════════════════════════════════
   SECTION BLOCKS
══════════════════════════════════════ */
.section {
  background:var(--surface2); border:1.5px solid var(--border);
  border-radius:var(--r); padding:18px; margin-bottom:16px;
  transition:border-color .2s;
}
.section:focus-within { border-color:rgba(99,102,241,.3); }
.sec-title {
  font-size:.82rem; font-weight:700; color:var(--text);
  display:flex; align-items:center; gap:7px; margin-bottom:14px;
  text-transform:uppercase; letter-spacing:.5px;
}
.sec-title span { color:var(--text2); }

/* video */
video {
  width:100%; border-radius:var(--r2); background:#0a0f1e;
  object-fit:cover; border:1.5px solid var(--border);
  margin-bottom:10px; max-height:240px;
}
#preview img {
  max-width:100%; border-radius:var(--r2); margin-top:10px;
  border:2px solid var(--hadir);
  box-shadow:0 0 20px var(--hadir-glow);
}
#preview p { font-size:.82rem; font-weight:600; color:var(--hadir); margin-top:8px; }

/* kv rows */
.kv {
  display:flex; justify-content:space-between; align-items:center;
  padding:9px 0; border-bottom:1px solid rgba(255,255,255,.05);
  font-size:.82rem; gap:8px;
}
.kv:last-child { border-bottom:none; }
.kv-l { color:var(--text3); white-space:nowrap; }
.kv-r { color:var(--text); font-weight:600; text-align:right; font-family:var(--ffm); font-size:.78rem; }
a.map-link {
  color:var(--pulang); text-decoration:none; font-size:.78rem; font-family:var(--ffm);
  background:var(--pulang-bg); padding:3px 8px; border-radius:6px;
  transition:background .2s;
}
a.map-link:hover { background:rgba(56,189,248,.25); }

/* ══════════════════════════════════════
   BUTTONS
══════════════════════════════════════ */
.btn-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:0; }
.btn-row-full { margin-top:8px; }

.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:13px 16px; border:none; border-radius:var(--r2);
  font-family:var(--ff); font-weight:700; font-size:.88rem;
  cursor:pointer; transition:all .2s; position:relative; overflow:hidden;
  width:100%;
}
.btn::after {
  content:''; position:absolute; inset:0;
  background:rgba(255,255,255,.12); opacity:0; transition:opacity .15s;
}
.btn:active::after { opacity:1; }
.btn:disabled { opacity:.38; cursor:not-allowed; transform:none !important; }

.btn-cam {
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:#fff; box-shadow:0 4px 14px rgba(59,130,246,.3);
}
.btn-cam:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 6px 20px rgba(59,130,246,.4); }

.btn-snap {
  background:linear-gradient(135deg,#10b981,#059669);
  color:#fff; box-shadow:0 4px 14px var(--hadir-glow);
}
.btn-snap:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 6px 20px rgba(16,185,129,.5); }

.btn-retry {
  background:var(--surface2); color:var(--text2); border:1.5px solid var(--border);
}
.btn-retry:hover:not(:disabled) { border-color:var(--borderA); color:var(--text); background:rgba(255,255,255,.06); }

.btn-submit {
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:#fff; box-shadow:0 6px 20px rgba(99,102,241,.35);
  padding:16px; font-size:1rem; border-radius:var(--r); margin-top:20px;
  letter-spacing:.2px;
}
.btn-submit:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 28px rgba(99,102,241,.5); }

/* ══════════════════════════════════════
   STATUS MESSAGES
══════════════════════════════════════ */
.msg {
  display:flex; align-items:flex-start; gap:8px;
  padding:11px 14px; border-radius:var(--r2);
  font-size:.82rem; font-weight:500; line-height:1.5;
  margin-top:10px; animation:fadeUp .25s ease;
}
.msg.ok   { background:var(--hadir-bg);  color:#6ee7b7; border:1px solid rgba(16,185,129,.2); }
.msg.err  { background:var(--sakit-bg);  color:#fca5a5; border:1px solid rgba(248,113,113,.2); }
.msg.info { background:rgba(99,102,241,.1); color:#a5b4fc; border:1px solid rgba(99,102,241,.2); }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(-6px); }
  to   { opacity:1; transform:translateY(0); }
}

#statusMsg { margin-top:12px; }
</style>
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <div class="header">
    <div class="hdr-dot">📋</div>
    <h1>Daftar Hadir ASN</h1>
    <p>Dinas Kelautan &amp; Perikanan · Kab. Rembang</p>
    <div class="live-time">
      <div class="live-dot"></div>
      <span id="waktu">—</span>
    </div>
  </div>

  <!-- BODY -->
  <div class="body">
    <form id="formPresensi" autocomplete="off">

      <!-- ID + Unit Kerja -->
      <div class="row2">
        <div class="field">
          <label>🆔 ID</label>
          <input id="id" name="id" placeholder="Masukkan ID" required/>
        </div>
        <div class="field">
          <label>🏢 Unit Kerja</label>
          <select id="tpi" name="tpi" required>
            <option value="">Pilih Unit</option>
            <option>Dinas</option>
            <option>UPT</option>
            <option>TPI Tunggulsari</option>
            <option>TPI Tanjungsari</option>
            <option>TPI Tasikagung I</option>
            <option>TPI Tasikagung II</option>
            <option>TPI Pasarbanggi</option>
            <option>TPI Pandangan</option>
            <option>TPI Karanganyar</option>
            <option>TPI Karanglincak</option>
            <option>TPI Sarang</option>
          </select>
        </div>
      </div>

      <!-- STATUS PICKER -->
      <div class="status-label">✅ Status Kehadiran</div>
      <div class="status-grid">
        <button type="button" class="status-btn"
          style="--c:var(--hadir);--cbg:var(--hadir-bg);--cglow:var(--hadir-glow)"
          onclick="pickStatus('Hadir',this)">
          <span class="sb-icon">✅</span>
          <span class="sb-lbl">Hadir</span>
        </button>
        <button type="button" class="status-btn"
          style="--c:var(--pulang);--cbg:var(--pulang-bg);--cglow:var(--pulang-glow)"
          onclick="pickStatus('Pulang',this)">
          <span class="sb-icon">🏠</span>
          <span class="sb-lbl">Pulang</span>
        </button>
        <button type="button" class="status-btn"
          style="--c:var(--ijin);--cbg:var(--ijin-bg);--cglow:var(--ijin-glow)"
          onclick="pickStatus('Ijin',this)">
          <span class="sb-icon">📋</span>
          <span class="sb-lbl">Ijin</span>
        </button>
        <button type="button" class="status-btn"
          style="--c:var(--sakit);--cbg:var(--sakit-bg);--cglow:var(--sakit-glow)"
          onclick="pickStatus('Sakit',this)">
          <span class="sb-icon">🤒</span>
          <span class="sb-lbl">Sakit</span>
        </button>
        <button type="button" class="status-btn"
          style="--c:var(--wfa);--cbg:var(--wfa-bg);--cglow:var(--wfa-glow)"
          onclick="pickStatus('WFA',this)">
          <span class="sb-icon">💻</span>
          <span class="sb-lbl">WFA</span>
        </button>
      </div>
      <!-- hidden real value -->
      <input type="hidden" id="status" name="status"/>
      <div id="statusPickMsg" style="display:none" class="msg err" style="margin-bottom:12px">⚠️ Pilih status kehadiran terlebih dahulu</div>

      <!-- KAMERA -->
      <div class="section">
        <div class="sec-title">📷 <span>Foto Selfie</span></div>
        <video id="video" playsinline autoplay muted></video>
        <div class="btn-row">
          <button type="button" id="btnKamera" class="btn btn-cam">🎥 Kamera</button>
          <button type="button" id="btnFoto"   class="btn btn-snap" disabled>📸 Ambil</button>
        </div>
        <div class="btn-row-full">
          <button type="button" id="btnUlang" class="btn btn-retry" disabled>🔄 Ulangi Foto</button>
        </div>
        <div id="preview"></div>
        <canvas id="canvas" style="display:none"></canvas>
        <div id="camMsg" style="display:none"></div>
      </div>

      <!-- LOKASI -->
      <div class="section">
        <div class="sec-title">📍 <span>Informasi Lokasi</span></div>
        <div class="kv"><span class="kv-l">📅 Tanggal</span>  <span class="kv-r" id="tglDisplay">—</span></div>
        <div class="kv"><span class="kv-l">🌍 Koordinat</span><span class="kv-r" id="koor">Mencari…</span></div>
        <div class="kv"><span class="kv-l">🎯 Akurasi</span>  <span class="kv-r" id="akurasi">—</span></div>
        <div class="kv"><span class="kv-l">🗺️ Peta</span>     <a id="mapLink" class="map-link" target="_blank">—</a></div>
        <div id="locMsg" style="display:none"></div>
      </div>

      <!-- SUBMIT -->
      <button id="btnSubmit" type="submit" class="btn btn-submit" disabled>
        💾 Simpan Presensi
      </button>

    </form>
    <div id="statusMsg"></div>
  </div>
</div>

<script>
/* ── WAKTU ── */
function updateWaktu(){
  const now = new Date();
  const tgl = now.toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short',year:'numeric',timeZone:'Asia/Jakarta'});
  const jam = now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'Asia/Jakarta'});
  document.getElementById('waktu').textContent = `${tgl} · ${jam}`;
  document.getElementById('tglDisplay').textContent = `${tgl}, ${jam}`;
}
setInterval(updateWaktu,1000); updateWaktu();

/* ── STATE ── */
const state = { stream:null, photoDataUrl:null, lokasi:null, watchId:null };
const el = id => document.getElementById(id);

/* ── STATUS PICKER ── */
let _selectedStatus = '';
function pickStatus(val, btn){
  _selectedStatus = val;
  el('status').value = val;
  document.querySelectorAll('.status-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  el('statusPickMsg').style.display = 'none';
  evaluateSubmitReady();
}

/* ── MSG HELPERS ── */
function showMsg(elId, text, type='info'){
  const box = el(elId);
  if(!text){ box.style.display='none'; box.className=''; return; }
  box.className = 'msg ' + type;
  box.textContent = text;
  box.style.display = 'flex';
}

/* ── KAMERA ── */
async function startCamera(){
  showMsg('camMsg','');
  el('btnFoto').disabled = true;
  el('btnUlang').disabled = true;
  const tries = [
    {video:{facingMode:{exact:'user'}},audio:false},
    {video:{facingMode:'user'},audio:false},
    {video:true,audio:false}
  ];
  if(state.stream){ state.stream.getTracks().forEach(t=>t.stop()); state.stream=null; }
  for(const c of tries){
    try{
      const stream = await navigator.mediaDevices.getUserMedia(c);
      state.stream = stream;
      const v = el('video'); v.srcObject = stream; await v.play();
      el('btnFoto').disabled = false;
      showMsg('camMsg','✅ Kamera aktif — arahkan wajah lalu klik Ambil','ok');
      return;
    }catch{}
  }
  showMsg('camMsg','❌ Tidak dapat mengakses kamera. Berikan izin kamera terlebih dahulu.','err');
}

function ambilFoto(){
  const v = el('video');
  if(!v.videoWidth){ showMsg('camMsg','⚠️ Kamera belum siap, tunggu sebentar.','err'); return; }
  const c = el('canvas');
  const max=1280, {videoWidth:w,videoHeight:h}=v, sc=Math.min(1,max/Math.max(w,h));
  c.width=Math.round(w*sc); c.height=Math.round(h*sc);
  c.getContext('2d').drawImage(v,0,0,c.width,c.height);
  state.photoDataUrl = c.toDataURL('image/jpeg',0.85);
  el('preview').innerHTML = `<p>✅ Foto berhasil diambil</p><img src="${state.photoDataUrl}" alt="Foto Selfie">`;
  if(state.stream){ state.stream.getTracks().forEach(t=>t.stop()); state.stream=null; }
  el('btnUlang').disabled = false;
  showMsg('camMsg','✅ Foto ditangkap. Klik Ulangi jika ingin mengambil ulang.','ok');
  evaluateSubmitReady();
}

function ulangFoto(){
  state.photoDataUrl = null;
  el('preview').innerHTML = '';
  startCamera();
  evaluateSubmitReady();
}

/* ── GPS ── */
function startGPS(){
  if(!('geolocation' in navigator)){ showMsg('locMsg','❌ Perangkat tidak mendukung GPS.','err'); return; }
  showMsg('locMsg','🔍 Mencari sinyal GPS… tetap di tempat terbuka.','info');
  el('koor').textContent='Mencari…'; el('akurasi').textContent='—';
  el('mapLink').textContent='—'; el('mapLink').removeAttribute('href');
  if(state.watchId){ navigator.geolocation.clearWatch(state.watchId); }
  state.watchId = navigator.geolocation.watchPosition(
    pos=>{
      const {latitude:lat,longitude:lng,accuracy:acc}=pos.coords;
      state.lokasi={latitude:lat,longitude:lng,accuracy:acc};
      el('koor').textContent=`${lat.toFixed(6)}, ${lng.toFixed(6)}`;
      el('akurasi').textContent=`±${Math.round(acc)} m`;
      const url=`https://maps.google.com/?q=${lat},${lng}`;
      el('mapLink').textContent='Lihat di Maps'; el('mapLink').href=url;
      showMsg('locMsg', acc<=5 ? '✅ Lokasi sangat akurat — siap submit!' : `⏳ Akurasi ${Math.round(acc)}m, perlu ≤20m. Pindah ke area terbuka.`, acc<=5?'ok':'info');
      evaluateSubmitReady();
    },
    err=>{ showMsg('locMsg','❌ Gagal memperoleh lokasi: '+err.message,'err'); evaluateSubmitReady(); },
    {enableHighAccuracy:true,timeout:20000,maximumAge:0}
  );
}

function evaluateSubmitReady(){
  const ok = !!state.photoDataUrl && !!(state.lokasi&&state.lokasi.accuracy<=20) && !!_selectedStatus;
  el('btnSubmit').disabled = !ok;
}

/* ── SUBMIT ── */
async function submitPresensi(e){
  e.preventDefault();
  if(!_selectedStatus){ el('statusPickMsg').style.display='flex'; return; }
  if(el('btnSubmit').disabled) return;
  const data={
    id: el('id').value.trim(),
    tpi: el('tpi').value,
    status: _selectedStatus,
    tanggal: new Date().toLocaleDateString('id-ID',{timeZone:'Asia/Jakarta'}),
    waktu: new Date().toLocaleTimeString('id-ID',{timeZone:'Asia/Jakarta'}),
    latitude: state.lokasi?.latitude??null,
    longitude: state.lokasi?.longitude??null,
    accuracy: state.lokasi?.accuracy??null,
    foto: state.photoDataUrl
  };
  if(!data.id||!data.tpi){ showMsg('statusMsg','⚠️ Lengkapi semua field wajib.','err'); return; }
  showMsg('statusMsg','⏳ Menyimpan presensi…','info');
  el('btnSubmit').disabled = true;
  const SCRIPT_URL="https://script.google.com/macros/s/AKfycby9GJBfJJEgNT8X60WHTCI70cQoMNGI-Fg9bxzpJAOrT7zMgRGFHuvvMQqioG3g0PU8/exec";
  try{
    await fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
    showMsg('statusMsg','✅ Presensi berhasil disimpan!','ok');
    el('formPresensi').reset();
    el('preview').innerHTML='';
    state.photoDataUrl=null;
    _selectedStatus='';
    document.querySelectorAll('.status-btn').forEach(b=>b.classList.remove('active'));
    evaluateSubmitReady();
  }catch(err){
    showMsg('statusMsg','❌ Gagal menyimpan: '+err.message,'err');
    el('btnSubmit').disabled=false;
  }
}

/* ── EVENTS ── */
el('btnKamera').addEventListener('click', startCamera);
el('btnFoto').addEventListener('click', ambilFoto);
el('btnUlang').addEventListener('click', ulangFoto);
el('formPresensi').addEventListener('submit', submitPresensi);
document.addEventListener('DOMContentLoaded', startGPS);
</script>
</body>
